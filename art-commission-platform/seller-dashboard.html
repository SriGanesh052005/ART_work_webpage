<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Dashboard - Artisan</title>
    <!-- Google Fonts: Outfit for modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
        }

        .sidebar {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            height: fit-content;
        }

        .sidebar-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-menu li a {
            display: block;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: var(--text-muted);
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .sidebar-menu li a:hover,
        .sidebar-menu li a.active {
            background: rgba(109, 40, 217, 0.1);
            color: var(--primary-color);
        }

        .dashboard-main {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 16px;
        }

        .stat-card h3 {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .stat-card .val {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
        }

        .upload-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
        }

        .upload-header {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            font-family: var(--font-family);
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary-color);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .file-drop-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-bottom: 1.5rem;
        }

        .file-drop-area:hover {
            border-color: var(--primary-color);
            background: rgba(109, 40, 217, 0.05);
        }

        @media (max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Artisan.</a>
            <div class="nav-links">
                <a href="#" onclick="logout()" class="btn btn-secondary">Logout</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="https://i.pravatar.cc/150?u=1" alt="Profile"
                    style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 1rem;">
                <h3 id="sellerName">Welcome, Artist</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" class="active">Overview</a></li>
                <li><a href="#">Upload Artwork</a></li>
                <li><a href="#">Commissions (2)</a></li>
                <li><a href="#">Profile Settings</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Profile Views</h3>
                    <div class="val">1,248</div>
                </div>
                <div class="stat-card">
                    <h3>Active Commissions</h3>
                    <div class="val">2</div>
                </div>
                <div class="stat-card">
                    <h3>Total Earnings</h3>
                    <div class="val">$3,450</div>
                </div>
            </div>

            <div class="upload-card">
                <h2 class="upload-header">Upload New Artwork</h2>
                <form onsubmit="handleUpload(event)">
                    <div class="file-drop-area">
                        <span style="font-size: 2rem; display: block; margin-bottom: 1rem;">🖼️</span>
                        <p>Drag & drop your high-res artwork here</p>
                        <p style="font-size: 0.8rem; margin-top: 0.5rem;">or click to browse (up to 50MB)</p>
                    </div>

                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" class="form-control" placeholder="E.g. Neon Cityscape" required>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <select class="form-control">
                            <option>Digital Art</option>
                            <option>Oil Painting</option>
                            <option>Anime/Manga</option>
                            <option>3D Model</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Description (Tools used, inspiration, etc.)</label>
                        <textarea class="form-control" placeholder="Describe your piece..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-glow" style="width: 100%;">Publish to Portfolio</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        function logout() {
            localStorage.removeItem('authRole');
            window.location.href = 'index.html';
        }

        function handleUpload(e) {
            e.preventDefault();
            alert("Artwork uploaded successfully! (Mock Action)");
            e.target.reset();
        }

        // Quick Auth Check
        if (localStorage.getItem('authRole') !== 'seller') {
            alert('Unauthorized! Redirecting to login.');
            window.location.href = 'login.html#seller';
        }
    </script>
</body>

</html>
